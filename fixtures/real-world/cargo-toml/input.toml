[package]
name = "example-app"
version = "0.3.1"
edition = "2021"
description = "An example crate demonstrating Cargo.toml disassembly."
license = "MIT"
repository = "https://github.com/example/example-app"

[lib]
name = "example_app"
path = "src/lib.rs"

[[bin]]
name = "example-app"
path = "src/main.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
clap = "4"

[dev-dependencies]
tempfile = "3"
walkdir = "2"

[features]
default = ["json"]
json = []
yaml = []
