# Configuration for cargo-mutants (https://mutants.rs/).
#
# Run `cargo mutants` locally to use this config. `cargo mutants --in-diff <file>`
# only mutates lines covered by the supplied unified diff; CI uses that for PRs.

# Pure entry points / boilerplate — nothing worth mutating.
exclude_globs = [
    "src/main.rs",
]

# Skip trait impls that are pure delegations or where mutants are typically
# equivalent (Debug/From/source). The Display impl in `error.rs` is exercised
# by `tests::display_covers_all_variants`, so we leave it mutable.
#
# We also skip the human-facing help / format-name strings. These are
# documentation surfaces, not behavior: pinning them down would require
# snapshot tests whose only purpose is to fail when the help text is edited,
# which is the opposite of what we want. The wording is reviewed manually.
#
# IMPORTANT: cargo-mutants matches `exclude_re` against the *mutant name*
# (e.g. `src/cli.rs:211:5: replace print_help with ()`), not the source
# declaration line. So patterns must anchor on the `replace <name>` form,
# never on `fn <name>`. Trait-impl mutants embed the impl header in the
# mutant name (e.g. `<impl std::error::Error for Error>::source`), so the
# `impl ...` patterns below match correctly.
exclude_re = [
    "impl .*Debug for",
    "impl From<.*> for Error",
    # `Error::source` impl (trait method on `std::error::Error`).
    "<impl std::error::Error for Error>::source",
    # CLI help printers (config-disassembler top-level CLI).
    "replace print_help",
    "replace print_format_help",
    "replace print_same_format_help",
    "replace print_cross_format_help",
    # Helper that joins format names for the `<fmt>` line in help output.
    "replace format_list",
    # `Format::display_name` is the human-friendly format label used in
    # help text and error messages; `Format::supported_format_list` is the
    # human-readable comma-joined name list for error contexts. Both are
    # cosmetic.
    "replace Format::display_name",
    "replace Format::supported_format_list",
    # `src/xml/cli.rs:178:15: replace += with *= in parse_disassemble_args`
    # is observationally equivalent. On the only branch that reaches
    # this `i += 1` (`else if path.is_none() { path = Some(arg.as_str());
    # i += 1; }`), mutating to `i *= 1` leaves `i` at its current value.
    # The next iteration re-reads the same positional arg, now finds
    # `path` already set, falls through to the `else { i += 1 }` arm
    # and recovers. The function's only output -- the populated
    # `DisassembleOpts` -- is unchanged for every input. The other
    # `i += 1` occurrences in this function generate their own mutants
    # at different `line:col`s and are killed by existing tests, so
    # this regex is anchored to the exact location to avoid masking
    # them.
    "src/xml/cli\\.rs:178:15: replace \\+= with \\*=",
]

# Give the suite extra wall-clock budget under mutation; minimums prevent flaky
# kills on fast unit tests that happen to time out under contention.
timeout_multiplier = 2.0
minimum_test_timeout = 60.0

# Match CI test invocation so feature-gated code paths are exercised.
additional_cargo_args = ["--all-features"]
