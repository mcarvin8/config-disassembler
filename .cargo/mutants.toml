# Configuration for cargo-mutants (https://mutants.rs/).
#
# Run `cargo mutants` locally to use this config. `cargo mutants --in-diff <file>`
# only mutates lines covered by the supplied unified diff; CI uses that for PRs.

# Pure entry points / boilerplate — nothing worth mutating.
exclude_globs = [
    "src/main.rs",
]

# Skip trait impls that are pure delegations or where mutants are typically
# equivalent (Debug/From/source). The Display impl in `error.rs` is exercised
# by `tests::display_covers_all_variants`, so we leave it mutable.
#
# We also skip the human-facing help / format-name strings. These are
# documentation surfaces, not behavior: pinning them down would require
# snapshot tests whose only purpose is to fail when the help text is edited,
# which is the opposite of what we want. The wording is reviewed manually.
#
# IMPORTANT: cargo-mutants matches `exclude_re` against the *mutant name*
# (e.g. `src/cli.rs:211:5: replace print_help with ()`), not the source
# declaration line. So patterns must anchor on the `replace <name>` form,
# never on `fn <name>`. Trait-impl mutants embed the impl header in the
# mutant name (e.g. `<impl std::error::Error for Error>::source`), so the
# `impl ...` patterns below match correctly.
exclude_re = [
    "impl .*Debug for",
    "impl From<.*> for Error",
    # `Error::source` impl (trait method on `std::error::Error`).
    "<impl std::error::Error for Error>::source",
    # CLI help printers (config-disassembler top-level CLI).
    "replace print_help",
    "replace print_format_help",
    "replace print_same_format_help",
    "replace print_cross_format_help",
    # Helper that joins format names for the `<fmt>` line in help output.
    "replace format_list",
    # `Format::display_name` is the human-friendly format label used in
    # help text and error messages; `Format::supported_format_list` is the
    # human-readable comma-joined name list for error contexts. Both are
    # cosmetic.
    "replace Format::display_name",
    "replace Format::supported_format_list",
    # `parse_reassemble_args` returns `(Option<&str>, Option<&str>,
    # bool)`. cargo-mutants's `FnValue` genre enumerates every
    # combination of "default-ish" values for the tuple and emits 18
    # mutants here (3 first-elem options x 3 second-elem options x 2
    # bool values, see `cargo mutants --list --file src/xml/cli.rs`).
    # The three with `(None, *, true)` are *catastrophic in the
    # cargo-mutants scratch tree*:
    #
    #   1. `run_reassemble` reads `path.unwrap_or(".")` -- with the
    #      mutated `path = None`, the working path collapses to `"."`.
    #   2. `run_reassemble` then calls
    #      `ReassembleXmlFileHandler::reassemble(".", Some("xml"), true)`.
    #   3. Inside `reassemble_plain`, the trailing
    #      `if post_purge { fs::remove_dir_all(file_path).await.ok(); }`
    #      runs with `file_path == "."`.
    #
    # Because `cargo test` always sets cwd to the cargo-mutants scratch
    # directory (`/tmp/cargo-mutants-config-disassembler-XXX.tmp/`),
    # the integration test
    # `run_reassemble_on_existing_directory_succeeds` (`xml/cli.rs`)
    # blows away the *entire scratch tree* -- including
    # `src/xml/cli.rs` itself -- and then panics. cargo-mutants records
    # the mutant as `Caught`, but the next mutant's `Apply` step finds
    # the source file gone and the worker dies with
    # `".../src/xml/cli.rs" does not exist, refusing to create it`,
    # aborting the remaining ~600 mutants in the sweep. The first such
    # variant tested in the deterministic `--no-shuffle` order is
    # `(None, None, true)`; once it deletes cwd, no later destructive
    # variants get a chance to run, but skipping only that one would
    # just shift the failure to `(None, Some(""), true)` etc.
    # Diagnosed via the post-#613 error message and cargo-mutants
    # debug.log (run 25818276284).
    #
    # The other 15 variants are not destructive and stay mutable:
    #   - `(None, *, false)` walks cwd looking for `.xml` files but
    #     does not purge; tests still catch it.
    #   - `(Some(""), *, *)` reduces to `reassemble("", ...)`, which
    #     fails with ENOENT before any destructive code runs.
    #   - `(Some("xyzzy"), *, *)` targets a non-existent path; same.
    #
    # We could instead defensively guard `reassemble_plain` against
    # `remove_dir_all` on cwd, but the excluded mutants have no
    # real-world meaning -- they encode "ignore every input and
    # request a destructive purge" -- and a narrow exclusion is more
    # honest than a guard that would silently mask future destructive
    # CLI bugs in user code. The regex is anchored to the file and to
    # the `(None, *, true)` shape so non-destructive variants are NOT
    # masked.
    "src/xml/cli\\.rs:.*: replace parse_reassemble_args -> .* with \\(None, .*, true\\)",
]

# Give the suite extra wall-clock budget under mutation; minimums prevent flaky
# kills on fast unit tests that happen to time out under contention.
timeout_multiplier = 2.0
minimum_test_timeout = 60.0

# Match CI test invocation so feature-gated code paths are exercised.
additional_cargo_args = ["--all-features"]
